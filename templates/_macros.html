{% macro password_field(name, autocomplete, required=True, maxlength=4096, minlength=None, autofocus=False) -%}
<span class="password-field">
  <input name="{{ name }}"{% if minlength %} minlength="{{ minlength }}"{% endif %} type="password" autocomplete="{{ autocomplete }}"{% if required %} required{% endif %} maxlength="{{ maxlength }}"{% if autofocus %} autofocus{% endif %}>
  <button class="password-toggle" type="button" data-password-toggle aria-label="Mostrar senha" aria-pressed="false"><svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><path d="M1.5 8s2.4-4.2 6.5-4.2S14.5 8 14.5 8s-2.4 4.2-6.5 4.2S1.5 8 1.5 8z" fill="none" stroke="currentColor" stroke-width="1.3"/><circle cx="8" cy="8" r="2" fill="none" stroke="currentColor" stroke-width="1.3"/></svg></button>
</span>
{%- endmacro %}
{% macro copy_value(label, value) -%}
<button class="copy-button" type="button" data-copy-value="{{ value }}" aria-label="Copiar {{ label }}" title="Copiar {{ label }}"><svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><rect x="5" y="5" width="8" height="9" rx="1.4" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M11 5V3.4A1.4 1.4 0 0 0 9.6 2H3.4A1.4 1.4 0 0 0 2 3.4v6.2A1.4 1.4 0 0 0 3.4 11H5" fill="none" stroke="currentColor" stroke-width="1.4"/></svg><span class="copy-feedback" aria-live="polite"></span></button>
{%- endmacro %}
{% macro copy_input(label, input_id) -%}
<button class="copy-button" type="button" data-copy-input="{{ input_id }}" aria-label="Copiar {{ label }}" title="Copiar {{ label }}"><svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><rect x="5" y="5" width="8" height="9" rx="1.4" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M11 5V3.4A1.4 1.4 0 0 0 9.6 2H3.4A1.4 1.4 0 0 0 2 3.4v6.2A1.4 1.4 0 0 0 3.4 11H5" fill="none" stroke="currentColor" stroke-width="1.4"/></svg><span class="copy-feedback" aria-live="polite"></span></button>
{%- endmacro %}
