{% extends "base.html" %}
{% block title %}Entrar · Service Manager{% endblock %}
{% block content %}
<section class="auth-card">
  <p class="eyebrow">Acesso protegido</p>
  <h1>Entrar no Service Manager</h1>
  <form method="post" action="{{ url_for('auth.login') }}">
    <label>Login<input name="username" type="text" autocomplete="username" required minlength="3" maxlength="64"></label>
    <label>Senha<input name="password" type="password" autocomplete="current-password" required maxlength="4096"></label>
    <button class="button" type="submit">Entrar</button>
  </form>
</section>
{% endblock %}
