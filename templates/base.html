<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>{% block title %}Service Manager{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css', v=asset_ver('css/app.css')) }}">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <script src="{{ url_for('static', filename='js/app.js', v=asset_ver('js/app.js')) }}" defer></script>
</head>
<body>
  <a class="skip-link" href="#main">Ir para o conteúdo</a>
  <header class="site-header">
    <a class="brand" href="{{ url_for('routes.index') }}">Service Manager</a>
    {% if g.current_user %}
    <span class="muted header-user">{{ g.current_user['username'] }}{% if g.current_user['role'] == 'admin' %} · admin{% endif %}</span>
    <div class="header-actions">
      {% if g.current_user['role'] == 'admin' %}
      <a class="button button-quiet" href="{{ url_for('auth.users') }}">Usuários</a>
      <a class="button button-quiet" href="{{ url_for('routes.audit_view') }}">Auditoria</a>
      {% endif %}
      <a class="button button-quiet" href="{{ url_for('routes.coverage') }}">Visão geral</a>
      <a class="button button-quiet" href="{{ url_for('auth.account') }}">Minha conta</a>
      <form class="logout-form" method="post" action="{{ url_for('auth.logout') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <button class="button button-quiet" type="submit">Sair</button>
      </form>
    </div>
    {% endif %}
  </header>
  <main id="main" class="page-shell">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
