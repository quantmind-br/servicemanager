{% extends "base.html" %}
{% block title %}Confirmar identidade · Service Manager{% endblock %}
{% block content %}
<section class="auth-card">
  <p class="eyebrow">Confirmação necessária</p>
  <h1>Confirme sua identidade</h1>
  {% if error %}<p class="feedback feedback-error" role="alert">{{ error }}</p>{% endif %}
  <p class="muted">A confirmação autoriza revelações por cinco minutos.</p>
  <form method="post" action="{{ url_for('auth.reauth') }}" data-no-submit-lock>
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Senha atual
      <span class="password-field">
        <input name="password" type="password" autocomplete="current-password" required maxlength="4096" autofocus>
        <button class="password-toggle" type="button" data-password-toggle aria-label="Mostrar senha" aria-pressed="false"><svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><path d="M1.5 8s2.4-4.2 6.5-4.2S14.5 8 14.5 8s-2.4 4.2-6.5 4.2S1.5 8 1.5 8z" fill="none" stroke="currentColor" stroke-width="1.3"/><circle cx="8" cy="8" r="2" fill="none" stroke="currentColor" stroke-width="1.3"/></svg></button>
      </span>
    </label>
    <button class="button" type="submit">Confirmar</button>
  </form>
</section>
{% endblock %}
